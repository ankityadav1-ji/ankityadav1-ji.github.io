<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ankit Yadav Official Website</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin:0;
}

header{
background:#007bff;
color:white;
padding:20px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:5px solid #007bff;
}

#subscriber{
font-size:40px;
color:red;
margin:15px;
}

button{

padding:15px;
margin:10px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;

}

.yt{background:red;}
.wa{background:green;}
.support{background:purple;}
.upi{background:#ff9800;}

#popup{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);

}

.popup-content{

background:white;
margin:10% auto;
padding:20px;
width:300px;
border-radius:15px;

}

</style>

</head>

<body>


<header>

<h1>Ankit Yadav Official Website</h1>
<p>Welcome to my website</p>

</header>



<div class="card">

<img src="profile.jpg" class="profile">

<h2>Ankit Yadav</h2>

<p>YouTuber & Content Creator</p>


<h2>Live Subscribers</h2>

<div id="subscriber">Loading...</div>



<button class="yt"

onclick="window.open('https://youtube.com/@techtonicankit')">

Open YouTube

</button>



<button class="wa"

onclick="window.open('https://wa.me/91870778683')">

WhatsApp

</button>



<button class="support"

onclick="openPopup()">

Support Me ❤️

</button>



<button class="upi"

onclick="payUPI()">

Pay via UPI

</button>



</div>



<div id="popup">

<div class="popup-content">

<h3>Scan & Support</h3>

<img src="phonepe_qr_ankit.jpg" width="200">

<br><br>

<button onclick="closePopup()">Close</button>

</div>

</div>




<script>



// YouTube API

let api="YOUR_API_KEY";

let channel="UCSA71zFCgLbJkBqbf8ytl5A";


fetch(

"https://www.googleapis.com/youtube/v3/channels?part=statistics&id="+channel+"&key="+api

)

.then(res=>res.json())

.then(data=>{

document.getElementById("subscriber").innerText=

data.items[0].statistics.subscriberCount;

});




// popup

function openPopup(){

document.getElementById("popup").style.display="block";

}



function closePopup(){

document.getElementById("popup").style.display="none";

}




// upi pay

function payUPI(){

window.location.href="upi://pay?pa=870778683@ptyes&pn=Ankit&cu=INR";

}



</script>



</body>

</html>
