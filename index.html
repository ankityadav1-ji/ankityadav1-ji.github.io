<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ankit Yadav Official Website</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:#f2f2f2;
transition:0.5s;
}

header{
background:linear-gradient(45deg,#007bff,#00c6ff);
color:white;
padding:25px;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.profile{
width:150px;
height:150px;
border-radius:50%;
border:5px solid #007bff;
}

#subscriber{
font-size:45px;
color:red;
margin:20px;
}

button{
padding:15px;
margin:10px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

.yt{background:red;}
.wa{background:green;}
.insta{background:purple;}
.darkbtn{background:black;}

.dark{
background:black;
color:white;
}

.dark .card{
background:#222;
}

</style>

</head>

<body>

<header>

<h1>Ankit Yadav Official Website</h1>

<p>YouTuber & Content Creator</p>

<button class="darkbtn" onclick="darkmode()">Dark Mode</button>

</header>


<div class="card">

<img src="ankit.jpg" class="profile">

<h2>Ankit Yadav</h2>

<p>TechTonic Live Subscribers</p>

<div id="subscriber">
Loading...
</div>


<button class="yt"
onclick="window.open('https://youtube.com/channel/UCSA71zFCgLbJkBqbf8ytl5A')">
Open YouTube
</button>


<button class="wa"
onclick="window.open('https://wa.me/919026697924')">
WhatsApp
</button>


<button class="insta"
onclick="window.open('https://instagram.com/')">
Instagram
</button>

</div>


<script>

function darkmode(){
document.body.classList.toggle("dark");
}



// ✅ YOUR API KEY ADDED

let api="AIzaSyBeF0J6Vvq2kX2YcmCeS_Hi8qavk2U7cKY";

let channel="UCSA71zFCgLbJkBqbf8ytl5A";


fetch("https://www.googleapis.com/youtube/v3/channels?part=statistics&id="+channel+"&key="+api)

.then(res=>res.json())

.then(data=>{

let sub=data.items[0].statistics.subscriberCount;

document.getElementById("subscriber").innerHTML=sub;

});


</script>


</body>

</html>
